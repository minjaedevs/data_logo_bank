<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Logo Bank - Logo Ngân Hàng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
        }

        .stat-item {
            background: #1e293b;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            border: 1px solid #334155;
        }

        .stat-item span {
            color: #60a5fa;
            font-weight: 700;
        }

        .search-box {
            max-width: 500px;
            margin: 0 auto 2rem;
        }

        .search-box input {
            width: 100%;
            padding: 0.875rem 1.25rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            color: #f1f5f9;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-box input:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15);
        }

        .search-box input::placeholder {
            color: #64748b;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: #60a5fa;
            box-shadow: 0 8px 24px rgba(96, 165, 250, 0.15);
        }

        .card img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .card-name {
            font-size: 0.875rem;
            font-weight: 600;
            color: #f1f5f9;
            text-align: center;
            line-height: 1.3;
        }

        .card-id {
            font-size: 0.75rem;
            color: #64748b;
            background: #0f172a;
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
            font-family: monospace;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }

        .btn {
            padding: 0.375rem 0.75rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.2s, transform 0.1s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-copy {
            background: #334155;
            color: #94a3b8;
        }

        .btn-copy:hover {
            background: #475569;
        }

        .btn-view {
            background: #1d4ed8;
            color: #fff;
        }

        .btn-view:hover {
            background: #2563eb;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #10b981;
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.875rem;
            opacity: 0;
            transition: transform 0.3s, opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #1e293b;
            color: #475569;
            font-size: 0.875rem;
        }

        .footer a {
            color: #60a5fa;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            body { padding: 1rem; }
            h1 { font-size: 1.75rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .card img { width: 80px; height: 80px; }
        }
    </style>
</head>

            return cktvBase + id + '.' + ext;

            return lstvBase + id + '.' + ext;

            return repoBase + 'img_' + id + '.webp';
        }

        function getFrameUrl(id) {
            return frameBase + id + '.png';
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                showToast('Link đã được copy!');
            }).catch(() => {
                showToast('Đã copy link!');
            });
        }

        function renderLogoCards(data) {
            grid.innerHTML = '';
            totalCount.textContent = data.length;

            if (data.length === 0) {
                grid.innerHTML = '<div class="no-results">Không tìm thấy ngân hàng nào.</div>';
                return;
            }

            data.forEach(item => {
                const url = getLogoUrl(item.id);
                const card = document.createElement('div');
                card.className = 'card';

                const img = document.createElement('img');
                img.src = url;
                img.alt = item.name;
                img.loading = 'lazy';

                const name = document.createElement('div');
                name.className = 'card-name';
                name.textContent = item.name;

                const idBadge = document.createElement('div');
                idBadge.className = 'card-id';
                idBadge.textContent = item.id;

                const actions = document.createElement('div');
                actions.className = 'card-actions';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'btn btn-copy';
                copyBtn.textContent = 'Copy Link';
                copyBtn.onclick = (e) => {
                    e.stopPropagation();
                    copyLink(url);
                };

                const viewBtn = document.createElement('a');
                viewBtn.className = 'btn btn-view';
                viewBtn.textContent = 'View';
                viewBtn.href = url;
                viewBtn.target = '_blank';

                actions.appendChild(copyBtn);
                actions.appendChild(viewBtn);

                card.appendChild(img);
                card.appendChild(name);
                card.appendChild(idBadge);
                card.appendChild(actions);

                grid.appendChild(card);
            });
        }

            document.getElementById('lstvCount').textContent = lstvLogos.length;

            lstvLogos.forEach(item => {
                const url = getLstvUrl(item.id, item.ext);
                const card = document.createElement('div');
                card.className = 'card';

                const img = document.createElement('img');
                img.src = url;
                img.alt = item.name;
                img.loading = 'lazy';

                const name = document.createElement('div');
                name.className = 'card-name';
                name.textContent = item.name;

                const idBadge = document.createElement('div');
                idBadge.className = 'card-id';
                idBadge.textContent = item.id + '.' + item.ext;

                const actions = document.createElement('div');
                actions.className = 'card-actions';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'btn btn-copy';
                copyBtn.textContent = 'Copy Link';
                copyBtn.onclick = (e) => {
                    e.stopPropagation();
                    copyLink(url);
                };

                const viewBtn = document.createElement('a');
                viewBtn.className = 'btn btn-view';
                viewBtn.textContent = 'View';
                viewBtn.href = url;
                viewBtn.target = '_blank';

                actions.appendChild(copyBtn);
                actions.appendChild(viewBtn);

                card.appendChild(img);
                card.appendChild(name);
                card.appendChild(idBadge);
                card.appendChild(actions);

                lstvGrid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (!query) {
                renderLogoCards(logos);
                return;
            }
            const filtered = logos.filter(item =>
                item.id.toLowerCase().includes(query) ||
                item.name.toLowerCase().includes(query)
            );
            renderLogoCards(filtered);
        });

        renderLogoCards(logos);
        renderFrameCards();
        renderCktvCards();
        renderLstvCards();
    </script>
</body>
</html>
